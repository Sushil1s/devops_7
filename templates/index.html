<!DOCTYPE html>
<html>
<head>
    <title>DevOps Calc</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; margin-top: 50px; }
        .calculator { border: 1px solid #ccc; padding: 20px; border-radius: 5px; box-shadow: 2px 2px 10px #aaa; }
        input, select, button { margin: 5px 0; padding: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Calculator</h2>
    <input type="number" id="num1" placeholder="First Number">
    <select id="operation">
        <option value="add">+</option>
        <option value="subtract">-</option>
        <option value="multiply">*</option>
        <option value="divide">/</option>
    </select>
    <input type="number" id="num2" placeholder="Second Number">
    <button onclick="calculate()">Calculate</button>
    <h3 id="result">Result: </h3>
</div>

<script>
    function calculate() {
        const num1 = document.getElementById('num1').value;
        const num2 = document.getElementById('num2').value;
        const operation = document.getElementById('operation').value;

        fetch('/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ num1: num1, num2: num2, operation: operation })
        })
        .then(response => response.json())
        .then(data => {
            if(data.error) {
                document.getElementById('result').innerText = "Error: " + data.error;
            } else {
                document.getElementById('result').innerText = "Result: " + data.result;
            }
        });
    }
</script>

</body>
</html>
